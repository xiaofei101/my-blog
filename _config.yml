# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: 我的技术博客
subtitle: '记录学习与成长'
description: '前端开发、AI 技术、编程笔记'
keywords: '前端，JavaScript，React，AI，编程，技术博客'
author: 小明
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://my-blog-xiaofei101.vercel.app
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: false

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: 技术
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: landscape
plugins:
  - hexo-generator-search
  - hexo-generator-sitemap
  - hexo-generator-feed

# Deployment
deploy:
  type: git
  repo: https://github.com/xiaofei101/my-blog.git
  branch: gh-pages

# Search
search:
  path: search.xml
  field: post
  format: html
  limit: 10000

# Sitemap
sitemap:
  path: sitemap.xml
  prefix: https://my-blog-xiaofei101.vercel.app/

# RSS Feed
feed:
  type: atom
  path: atom.xml
  limit: 20
  order_by: -date
